<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assembler.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark">
    <title>SIC/XE Assembler</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow-x: auto;

        html, body {
          overflow: hidden;
        }

      #root {
        background-color: transparent;

      }
      
      #static-loader {
        position: fixed;
        inset: 0;

        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

  <body>
    <div id="static-loader">
      <div class="pixel-chest">
        <div class="chest-lid"></div>
      </div>
      <h2 class="loader-text">INITIALIZING SYSTEM</h2>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
